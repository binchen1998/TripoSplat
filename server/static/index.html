<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TripoSplat 图片转 3D Gaussian</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #0f1117; color: #e2e8f0; }
    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 400px) 1fr;
      gap: 0;
      min-height: 100vh;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .viewer-col { min-height: 420px; }
    }
    .side {
      padding: 28px 20px 40px;
      border-right: 1px solid #2d3748;
    }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 8px; }
    p.sub { color: #94a3b8; font-size: 0.9rem; margin: 0 0 20px; line-height: 1.5; }
    label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px; }
    input[type=file] { width: 100%; margin-bottom: 16px; }
    select, input[type=number] {
      width: 100%; padding: 8px 10px; margin-bottom: 12px;
      border-radius: 6px; border: 1px solid #334155;
      background: #0f1117; color: #e2e8f0; font-size: 0.85rem;
    }
    details.sampling {
      margin-bottom: 16px; padding: 12px 14px;
      border-radius: 8px; background: #1a2030; border: 1px solid #2d3748;
    }
    details.sampling summary {
      cursor: pointer; color: #94a3b8; font-size: 0.85rem; user-select: none;
    }
    details.sampling[open] summary { margin-bottom: 12px; }
    .field { margin-bottom: 4px; }
    button {
      width: 100%; padding: 12px; border: 0; border-radius: 8px;
      background: #3b82f6; color: #fff; font-size: 1rem; cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .panel {
      margin-top: 20px; padding: 14px; border-radius: 10px;
      background: #1a2030; border: 1px solid #2d3748;
    }
    .stage { font-size: 0.95rem; min-height: 1.4em; margin-bottom: 12px; }
    .bar-wrap { height: 8px; background: #334155; border-radius: 4px; overflow: hidden; }
    .bar { height: 100%; width: 0%; background: #60a5fa; transition: width 0.25s; }
    .meta { font-size: 0.8rem; color: #64748b; margin-top: 10px; }
    .links { margin-top: 10px; font-size: 0.85rem; }
    .links a { color: #93c5fd; word-break: break-all; }
    .err { color: #f87171; }

    .viewer-col {
      display: flex;
      flex-direction: column;
      background: radial-gradient(ellipse at 50% 60%, #1a2035 0%, #080b12 100%);
      min-height: 360px;
    }
    .viewer-head {
      padding: 12px 16px;
      font-size: 0.8rem;
      color: #64748b;
      border-bottom: 1px solid #2d3748;
      flex-shrink: 0;
    }
    .viewer-wrap {
      flex: 1;
      position: relative;
      min-height: 320px;
    }
    .viewer-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    .viewer-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-size: 0.9rem;
      text-align: center;
      padding: 24px;
    }
    .divider {
      margin: 22px 0 14px;
      border: 0;
      border-top: 1px solid #2d3748;
    }
    h2 { font-size: 0.95rem; font-weight: 600; margin: 0 0 10px; color: #cbd5e1; }
    input[type=url], input[type=text].ply-url {
      width: 100%; padding: 8px 10px; margin-bottom: 10px;
      border-radius: 6px; border: 1px solid #334155;
      background: #0f1117; color: #e2e8f0; font-size: 0.85rem;
    }
    .btn-secondary {
      background: #334155;
      margin-top: 4px;
    }
    .hint { font-size: 0.75rem; color: #64748b; margin-top: 6px; line-height: 1.4; }
  </style>
</head>
<body>
<div class="layout">
  <div class="side">
    <h1>TripoSplat</h1>
    <p class="sub">上传图片生成 3D Gaussian。完成后右侧可旋转预览。</p>

    <form id="form">
      <label for="image">输入图片</label>
      <input id="image" name="image" type="file" accept="image/*" required>

      <details class="sampling">
        <summary>采样参数（与 Gradio 一致）</summary>
        <div class="field">
          <label for="numGaussians">高斯数量</label>
          <select id="numGaussians" name="num_gaussians">
            <option value="32768" selected>32,768</option>
            <option value="65536">65,536</option>
            <option value="131072">131,072</option>
            <option value="262144">262,144</option>
          </select>
        </div>
        <div class="field">
          <label for="seed">Seed</label>
          <input id="seed" name="seed" type="number" value="42" step="1">
        </div>
        <div class="field">
          <label for="steps">Inference steps (1–50)</label>
          <input id="steps" name="steps" type="number" value="20" min="1" max="50" step="1">
        </div>
        <div class="field">
          <label for="guidanceScale">Guidance scale (1–10)</label>
          <input id="guidanceScale" name="guidance_scale" type="number" value="3" min="1" max="10" step="0.5">
        </div>
      </details>

      <button type="submit" id="btn">开始生成</button>
    </form>

    <div class="panel" id="statusPanel" hidden>
      <div class="stage" id="stage">—</div>
      <div class="bar-wrap"><div class="bar" id="bar"></div></div>
      <div class="meta" id="meta"></div>
      <div class="links" id="links"></div>
    </div>

    <hr class="divider">
    <h2>直接预览 PLY</h2>
    <p class="hint">无需生成，可加载本地文件或七牛 / 任意可访问的 PLY URL。</p>
    <label for="plyFile">本地 .ply</label>
    <input id="plyFile" type="file" accept=".ply,application/octet-stream">
    <label for="plyUrl">PLY URL</label>
    <input id="plyUrl" class="ply-url" type="url" placeholder="https://…/model.ply">
    <button type="button" id="plyPreviewBtn" class="btn-secondary">打开预览</button>
    <p class="hint"><a href="/viewer/viewer.html" target="_blank" rel="noopener" style="color:#93c5fd">全屏 viewer</a> 支持拖入文件</p>
  </div>

  <div class="viewer-col">
    <div class="viewer-head">3D 预览 · 拖拽旋转 · 滚轮缩放 · 右键平移</div>
    <div class="viewer-wrap">
      <div class="viewer-placeholder" id="viewerPlaceholder">生成完成后将在此显示 Spark.js 预览</div>
      <iframe id="viewerFrame" title="3D Gaussian preview" hidden></iframe>
    </div>
  </div>
</div>

<script>
const form = document.getElementById('form');
const btn = document.getElementById('btn');
const panel = document.getElementById('statusPanel');
const stageEl = document.getElementById('stage');
const bar = document.getElementById('bar');
const meta = document.getElementById('meta');
const links = document.getElementById('links');
const viewerFrame = document.getElementById('viewerFrame');
const viewerPlaceholder = document.getElementById('viewerPlaceholder');

let pollTimer = null;
let currentJobId = null;

function stopPoll() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

function hideViewer() {
  viewerFrame.hidden = true;
  viewerFrame.removeAttribute('src');
  viewerPlaceholder.hidden = false;
}

let plyObjectUrl = null;

function revokePlyObjectUrl() {
  if (plyObjectUrl) {
    URL.revokeObjectURL(plyObjectUrl);
    plyObjectUrl = null;
  }
}

function showViewerWithPlyUrl(plyUrl) {
  if (!plyUrl) return;
  viewerFrame.src = `/viewer/viewer.html?ply=${encodeURIComponent(plyUrl)}&ts=${Date.now()}`;
  viewerFrame.hidden = false;
  viewerPlaceholder.hidden = true;
}

function showViewer(jobId) {
  showViewerWithPlyUrl(`/api/jobs/${jobId}/output.ply`);
}

document.getElementById('plyPreviewBtn').addEventListener('click', () => {
  const file = document.getElementById('plyFile').files[0];
  const url = document.getElementById('plyUrl').value.trim();
  revokePlyObjectUrl();
  if (file) {
    if (!file.name.toLowerCase().endsWith('.ply')) {
      alert('请选择 .ply 文件');
      return;
    }
    plyObjectUrl = URL.createObjectURL(file);
    showViewerWithPlyUrl(plyObjectUrl);
    return;
  }
  if (url) {
    showViewerWithPlyUrl(url);
    return;
  }
  alert('请选择本地 PLY 或填写 URL');
});

async function pollJob(jobId) {
  const res = await fetch(`/api/jobs/${jobId}`);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

function renderStatus(data) {
  panel.hidden = false;
  stageEl.textContent = data.stage_message || data.status;
  bar.style.width = `${Math.max(0, Math.min(100, data.progress || 0))}%`;
  meta.textContent = `状态: ${data.status} · 进度: ${(data.progress || 0).toFixed(1)}% · 高斯数: ${data.num_gaussians || '—'}`;

  links.innerHTML = '';
  if (data.status === 'completed') {
    if (data.ply_url) {
      links.innerHTML += `<p><a href="${data.ply_url}" target="_blank" rel="noopener">PLY（七牛 CDN）</a></p>`;
      links.innerHTML += `<p><button type="button" id="previewCdnBtn" style="background:#334155;color:#e2e8f0;border:0;padding:6px 12px;border-radius:6px;cursor:pointer">用 CDN 地址预览</button></p>`;
    }
    if (data.splat_url) {
      links.innerHTML += `<p><a href="${data.splat_url}" target="_blank" rel="noopener">SPLAT（七牛 CDN）</a></p>`;
    }
    if (currentJobId) {
      showViewer(currentJobId);
    }
    const cdnBtn = document.getElementById('previewCdnBtn');
    if (cdnBtn && data.ply_url) {
      cdnBtn.onclick = () => showViewerWithPlyUrl(data.ply_url);
    }
    btn.disabled = false;
    stopPoll();
  } else if (data.status === 'failed') {
    stageEl.innerHTML = `<span class="err">${data.stage_message || '失败'}</span>`;
    if (data.error) meta.textContent += ` · ${data.error}`;
    hideViewer();
    btn.disabled = false;
    stopPoll();
  }
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const file = document.getElementById('image').files[0];
  if (!file) return;

  btn.disabled = true;
  stopPoll();
  links.innerHTML = '';
  hideViewer();
  currentJobId = null;
  stageEl.textContent = '正在提交任务…';
  bar.style.width = '0%';
  panel.hidden = false;

  const body = new FormData();
  body.append('image', file);
  body.append('num_gaussians', document.getElementById('numGaussians').value);
  body.append('seed', document.getElementById('seed').value);
  body.append('steps', document.getElementById('steps').value);
  body.append('guidance_scale', document.getElementById('guidanceScale').value);

  try {
    const res = await fetch('/api/jobs', { method: 'POST', body });
    if (!res.ok) throw new Error(await res.text());
    const { job_id } = await res.json();
    currentJobId = job_id;

    const tick = async () => {
      try {
        const data = await pollJob(job_id);
        renderStatus(data);
      } catch (err) {
        stageEl.innerHTML = `<span class="err">轮询失败: ${err.message}</span>`;
        btn.disabled = false;
        stopPoll();
      }
    };
    await tick();
    pollTimer = setInterval(tick, 1500);
  } catch (err) {
    stageEl.innerHTML = `<span class="err">提交失败: ${err.message}</span>`;
    btn.disabled = false;
  }
});
</script>
</body>
</html>
