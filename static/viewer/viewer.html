<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3DGS Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden;
    background: radial-gradient(ellipse at 50% 60%, #1a2035 0%, #080b12 100%); }
  canvas { display: block; }
  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    padding: 10px 14px;
    background: rgba(15, 17, 23, 0.92);
    border-bottom: 1px solid #2d3748;
    font: 13px system-ui, sans-serif;
    color: #e2e8f0;
  }
  #toolbar label { color: #94a3b8; font-size: 12px; }
  #toolbar input[type=file] { max-width: 200px; font-size: 12px; }
  #toolbar input[type=url] {
    flex: 1; min-width: 160px; max-width: 480px;
    padding: 6px 10px; border-radius: 6px; border: 1px solid #334155;
    background: #1a2030; color: #e2e8f0;
  }
  #toolbar button {
    padding: 6px 14px; border: 0; border-radius: 6px;
    background: #3b82f6; color: #fff; cursor: pointer; font-size: 12px;
  }
  #toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }
  #hud {
    position: fixed; top: 52px; left: 16px; z-index: 10;
    color: #94a3b8; font: 12px/1.5 system-ui, sans-serif;
    pointer-events: none; user-select: none;
  }
  #loading {
    position: fixed; inset: 0; z-index: 5;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #94a3b8; font: 14px system-ui, sans-serif;
    gap: 12px; pointer-events: none;
  }
  #spinner {
    width: 36px; height: 36px;
    border: 3px solid #334155;
    border-top-color: #60a5fa;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error {
    display: none; z-index: 15;
    position: fixed; inset: 0;
    align-items: center; justify-content: center;
    color: #f87171; font: 13px system-ui, sans-serif;
    padding: 32px; text-align: center; white-space: pre-wrap;
    background: rgba(8, 11, 18, 0.85);
  }
  body.drag-over::after {
    content: "松开以加载 PLY";
    position: fixed; inset: 0; z-index: 30;
    display: flex; align-items: center; justify-content: center;
    background: rgba(59, 130, 246, 0.15);
    border: 2px dashed #60a5fa;
    color: #93c5fd; font: 16px system-ui, sans-serif;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="toolbar">
  <label>PLY 文件</label>
  <input id="fileInput" type="file" accept=".ply,application/octet-stream">
  <label>或 URL</label>
  <input id="urlInput" type="url" placeholder="https://…/model.ply">
  <button type="button" id="loadBtn">加载</button>
</div>
<div id="loading">
  <div id="spinner"></div>
  <div id="loading-label">选择或加载 PLY…</div>
</div>
<div id="error"></div>
<div id="hud">拖拽旋转 · 滚轮缩放 · 右键平移 · 可拖入 .ply 文件</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.180.0/examples/jsm/",
    "@sparkjsdev/spark": "https://unpkg.com/@sparkjsdev/spark@2.0.0/dist/spark.module.js"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { SparkRenderer, SplatMesh } from "@sparkjsdev/spark";

const params = new URLSearchParams(location.search);
const fileInput = document.getElementById("fileInput");
const urlInput = document.getElementById("urlInput");
const loadBtn = document.getElementById("loadBtn");
const loadingEl = document.getElementById("loading");
const loadLabel = document.getElementById("loading-label");
const errorEl = document.getElementById("error");

let activeObjectUrl = null;
let sceneCtx = null;
let animFrame = null;

function showError(msg) {
  loadingEl.style.display = "none";
  errorEl.style.display = "flex";
  errorEl.textContent = msg;
}

function hideError() {
  errorEl.style.display = "none";
  errorEl.textContent = "";
}

function revokeObjectUrl() {
  if (activeObjectUrl) {
    URL.revokeObjectURL(activeObjectUrl);
    activeObjectUrl = null;
  }
}

function resolvePlyUrl(raw) {
  const s = (raw || "").trim();
  if (!s) return null;
  if (s.startsWith("blob:") || s.startsWith("http://") || s.startsWith("https://")
      || s.startsWith("/")) {
    return s;
  }
  return s;
}

function disposeScene() {
  if (animFrame) {
    cancelAnimationFrame(animFrame);
    animFrame = null;
  }
  if (!sceneCtx) return;
  const { renderer, controls, splatRoot, splat } = sceneCtx;
  controls?.dispose();
  splatRoot?.remove(splat);
  splat?.dispose?.();
  renderer?.dispose();
  renderer?.domElement?.remove();
  sceneCtx = null;
}

function init(url) {
  hideError();
  loadingEl.style.display = "flex";
  loadLabel.textContent = "Loading splat…";
  disposeScene();

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
  camera.position.set(0, 0.3, 1.8);

  const renderer = new THREE.WebGLRenderer({ antialias: false });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const spark = new SparkRenderer({ renderer });
  scene.add(spark);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.07;
  controls.minDistance = 0.2;
  controls.maxDistance = 50;
  controls.target.set(0, 0, 0);

  const splat = new SplatMesh({ url });
  const splatRoot = new THREE.Group();
  splatRoot.add(splat);
  splat.rotation.y = Math.PI / 2;
  splatRoot.rotation.x = Math.PI;
  scene.add(splatRoot);

  sceneCtx = { scene, camera, renderer, controls, spark, splat, splatRoot };

  let framed = false;
  function tryFrame() {
    if (framed) return;
    const box = new THREE.Box3().setFromObject(splatRoot);
    if (box.isEmpty() || !isFinite(box.min.x)) return;
    framed = true;
    loadingEl.style.display = "none";
  }

  fetch(url, { method: "HEAD" }).then(r => {
    if (!r.ok) return;
    const len = r.headers.get("content-length");
    if (len) loadLabel.textContent = `Loading splat (${(len / 1024 / 1024).toFixed(1)} MB)…`;
  }).catch(() => {});

  let checkFrames = 0;
  function onFrame() {
    controls.update();
    renderer.render(scene, camera);
    checkFrames++;
    if (checkFrames >= 5) tryFrame();
  }

  function loop() {
    onFrame();
    animFrame = requestAnimationFrame(loop);
  }
  loop();

  setTimeout(() => { loadingEl.style.display = "none"; }, 4000);
}

function loadFromUrl(rawUrl) {
  const url = resolvePlyUrl(rawUrl);
  if (!url) {
    showError("请填写 PLY 的 URL 或选择本地文件");
    return;
  }
  urlInput.value = rawUrl.startsWith("blob:") ? "" : url;
  init(url);
}

function loadFromFile(file) {
  if (!file) return;
  const name = (file.name || "").toLowerCase();
  if (!name.endsWith(".ply")) {
    showError("请选择 .ply 文件");
    return;
  }
  revokeObjectUrl();
  activeObjectUrl = URL.createObjectURL(file);
  fileInput.value = "";
  loadFromUrl(activeObjectUrl);
}

loadBtn.addEventListener("click", () => {
  const f = fileInput.files?.[0];
  if (f) {
    loadFromFile(f);
    return;
  }
  loadFromUrl(urlInput.value);
});

fileInput.addEventListener("change", () => {
  const f = fileInput.files?.[0];
  if (f) loadFromFile(f);
});

document.body.addEventListener("dragover", (e) => {
  e.preventDefault();
  document.body.classList.add("drag-over");
});
document.body.addEventListener("dragleave", () => {
  document.body.classList.remove("drag-over");
});
document.body.addEventListener("drop", (e) => {
  e.preventDefault();
  document.body.classList.remove("drag-over");
  const f = [...(e.dataTransfer?.files || [])].find(x =>
    (x.name || "").toLowerCase().endsWith(".ply"));
  if (f) loadFromFile(f);
});

window.addEventListener("resize", () => {
  if (!sceneCtx) return;
  const { camera, renderer } = sceneCtx;
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const initial = params.get("ply") || params.get("url");
if (initial) {
  urlInput.value = initial.startsWith("blob:") ? "" : initial;
  loadFromUrl(initial);
} else {
  loadingEl.style.display = "flex";
  loadLabel.textContent = "选择 PLY 文件、输入 URL，或拖入 .ply";
}
</script>
</body>
</html>
